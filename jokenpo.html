<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jokenpô</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Comic Neue', cursive; }
    .hq-title { font-family: 'Bangers', cursive; letter-spacing: 2px; }
    .comic-border { border: 4px solid #000; box-shadow: 6px 6px 0 #000; }
    .dot-bg {
      background-image: radial-gradient(#000 1px, transparent 1px);
      background-size: 12px 12px;
    }
  </style>
</head>
<body class="bg-yellow-300 dot-bg min-h-screen flex items-center justify-center">

  <div class="w-full max-w-xl p-6 space-y-6">

    <!-- Header -->
    <div class="text-center bg-white comic-border p-4">
      <h1 class="text-4xl hq-title">JOKENPÔ!</h1>
    </div>

    <!-- Placar -->
    <div class="flex justify-between bg-white comic-border p-4 text-center">
      <div>
        <p class="font-bold">VOCÊ</p>
        <p id="playerScore" class="text-3xl">0</p>
      </div>
      <div>
        <p class="font-bold">MÁQUINA</p>
        <p id="cpuScore" class="text-3xl">0</p>
      </div>
    </div>

    <!-- Resultado -->
    <div class="bg-white comic-border p-6 text-center space-y-4">
      <p id="resultText" class="text-xl font-bold">Escolha sua jogada!</p>
      <div class="flex justify-around items-center text-6xl">
        <span id="playerChoice">❔</span>
        <img src="vs.png" alt="VS" class="w-16 h-16">
        <span id="cpuChoice">❔</span>
      </div>
    </div>

    <!-- Botões -->
    <div class="grid grid-cols-3 gap-4">
      <button onclick="play('pedra')" class="bg-red-400 comic-border p-4 text-xl font-bold hover:scale-105 transition">✊ Pedra</button>
      <button onclick="play('papel')" class="bg-blue-400 comic-border p-4 text-xl font-bold hover:scale-105 transition">✋ Papel</button>
      <button onclick="play('tesoura')" class="bg-green-400 comic-border p-4 text-xl font-bold hover:scale-105 transition">✌️ Tesoura</button>
    </div>

    <!-- Reset -->
    <button onclick="resetGame()" class="w-full bg-black text-white comic-border p-3 font-bold hover:scale-105 transition">
      Reiniciar Jogo
    </button>

    <a href="index.html"><button class="w-full bg-white text-black comic-border p-3 font-bold hover:scale-105 transition">
      Voltar
    </button></a>

  </div>
  <script src="scriptjokenpo.js"></script>
  
</body>
</html>
