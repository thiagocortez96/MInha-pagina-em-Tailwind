<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center font-sans text-white overflow-hidden">

    <div class="text-center mb-6">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-yellow-400 mb-2">
            Snake Game
        </h1>
        <div class="flex justify-center gap-8 text-slate-400 font-mono text-xl">
            <p>Pontos: <span id="score" class="text-white font-bold">0</span></p>
            <p>Nível: <span id="levelDisplay" class="text-emerald-400">-</span></p>
        </div>
    </div>

    <div id="menu" class="absolute inset-0 z-20 bg-slate-900/95 flex flex-col items-center justify-center transition-opacity duration-300">
        <h2 class="text-2xl mb-6 font-semibold uppercase tracking-widest text-emerald-400">Escolha seu Desafio</h2>
        <div class="flex flex-col gap-4 w-48">
            <button onclick="startGame(150, 'Fácil')" class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-bold shadow-lg transition-all hover:scale-105 italic">Fácil</button>
            <button onclick="startGame(100, 'Médio')" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold shadow-lg transition-all hover:scale-105 italic">Médio</button>
            <button onclick="startGame(60, 'Difícil')" class="px-6 py-3 bg-rose-600 hover:bg-rose-500 rounded-lg font-bold shadow-lg transition-all hover:scale-105 italic">Difícil</button>
        </div>
    </div>

    <div id="gameOverBox" class="hidden absolute inset-0 z-30 bg-black/80 flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="bg-slate-800 p-8 rounded-2xl border-2 border-rose-500 text-center shadow-[0_0_30px_rgba(244,63,94,0.4)]">
            <h2 id="deathReason" class="text-4xl font-black text-rose-500 mb-2">GAME OVER</h2>
            <p class="text-slate-300 mb-6 text-lg">Sua pontuação foi: <span id="finalScore" class="text-white font-bold text-2xl">0</span></p>
            <button onclick="closeGameOver()" class="px-8 py-3 bg-emerald-500 hover:bg-emerald-400 text-white rounded-full font-bold transition-all transform active:scale-95">
                Tentar Novamente 🔄
            </button>
        </div>
    </div>

    <div class="relative p-1 bg-gradient-to-tr from-emerald-500 via-yellow-500 to-rose-500 rounded-xl shadow-2xl">
        <canvas id="snakeGame" width="400" height="400" class="bg-slate-800 rounded-lg block"></canvas>
    </div>

    <script src="snake.js" defer></script>
</body>
</html>
